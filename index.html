<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Shelly - Дом</title>
    <style>
        /* Темная тема Shelly Cloud */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #16181c;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #ffffff;
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-align: left;
            width: 100%;
            max-width: 600px;
            border-bottom: 1px solid #2c3036;
            padding-bottom: 15px;
        }

        .dashboard-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            width: 100%;
            max-width: 600px;
            justify-content: center;
        }

        /* --- Квадратные карточки --- */
        .device-card {
            background-color: #272a31;
            border-radius: 12px;
            padding: 20px;
            width: 220px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .device-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 5px;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .device-subtitle {
            font-size: 0.75rem;
            color: #8b929c;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .sensor-data {
            display: flex; align-items: center; justify-content: center;
            width: 100%; margin-bottom: 10px; padding: 10px;
            background-color: #1e2025; border-radius: 10px; box-sizing: border-box;
        }

        .sensor-item {
            display: flex; align-items: center; gap: 8px;
            font-size: 1.1rem; font-weight: 600; color: #e0e6ed;
        }

        .sensor-icon { display: flex; align-items: center; color: #6db1ff; }

        .temp-badge {
            background-color: #31363f; padding: 10px 20px; border-radius: 20px;
            font-size: 1.4rem; font-weight: bold; display: flex; align-items: center;
            gap: 10px; margin-top: 5px;
        }

        .temp-badge .sensor-icon { color: #ff6b8b; }

        .status-badge {
            font-size: 0.85rem; padding: 6px 16px; border-radius: 12px;
            font-weight: 600; margin-top: 10px; transition: all 0.3s ease;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .status-badge.on { background-color: rgba(0, 123, 255, 0.2); color: #6db1ff; border: 1px solid #007bff; }
        .status-badge.off { background-color: #1e2025; color: #8b929c; border: 1px solid transparent; }

        .update-time { font-size: 0.7rem; color: #5a6069; margin-top: 15px; text-align: center;}
        .error-text { color: #ff6b8b; font-weight: bold; }
        .unit { font-size: 0.85rem; color: #8b929c; margin-left: 2px; }

        /* --- Горизонтальные карточки (Реле и Свет) --- */
        .section-title {
            color: #8b929c; font-size: 0.85rem; width: 100%; max-width: 600px;
            text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; margin-bottom: -5px;
            padding-left: 5px; box-sizing: border-box;
        }

        .relays-container {
            width: 100%; max-width: 600px; display: flex; flex-direction: column;
            gap: 12px; margin-top: 15px;
        }

        .relay-card {
            background-color: #272a31; border-radius: 12px; padding: 12px 15px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .relay-card.active { border: 2px solid #007bff; background-color: #212833; }
        .relay-left { display: flex; align-items: flex-start; gap: 15px; flex-grow: 1; }
        
        /* Иконки устройств */
        .relay-device-icon {
            width: 44px; height: 44px; border-radius: 8px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid #1a1c21; box-shadow: inset 0 0 10px rgba(0,0,0,0.3); color: #ffffff;
        }
        .icon-ev { background-color: #92313b; }
        .icon-light { background-color: #d35400; } /* Янтарный цвет для света */

        .relay-info { display: flex; flex-direction: column; gap: 4px; width: 100%; padding-top: 2px; }
        .relay-name { font-size: 1rem; font-weight: 700; color: #ffffff; }
        .relay-stats { display: flex; gap: 15px; font-size: 0.85rem; color: #e0e6ed; font-weight: 600; }
        .relay-stats span { display: flex; align-items: center; gap: 4px; }
        .relay-stats .sensor-icon { width: 12px; height: 12px; color: #8b929c; }

        /* Ползунок яркости */
        .dimmer-slider {
            -webkit-appearance: none; width: 95%; height: 6px;
            background: #1e2025; border-radius: 4px; outline: none; margin-top: 8px; margin-bottom: 5px;
        }
        .dimmer-slider::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 18px; height: 18px; border-radius: 50%;
            background: #6db1ff; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* Кнопка включения */
        .power-btn {
            width: 46px; height: 46px; border-radius: 50%; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0; align-self: center;
            transition: all 0.2s ease; outline: none; box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .power-btn svg { width: 20px; height: 20px; fill: currentColor; }
        .power-btn.off { background-color: #e0e6ed; color: #007bff; }
        .power-btn.on { background-color: #007bff; color: #ffffff; box-shadow: 0 0 15px rgba(0, 123, 255, 0.4); }

    </style>
</head>
<body>

    <script>
        const AUTH_KEY = "MWEzMWI0dWlk07E8AECF7EC066046A87D6410853E336FBB1D6F260B8376F3C047EE699E8019EA03F97657F6EF690";
        const HT_DEVICE_ID = "c9f4e3"; 
        const PUMP_DEVICE_ID = "7c87ceb51d71"; 

        async function fetchShellyStatus(deviceId) {
            const targetUrl = 'https://shelly-70-eu.shelly.cloud/device/status';
            const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(targetUrl);
            const response = await fetch(proxyUrl, {
                method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `id=${deviceId}&auth_key=${AUTH_KEY}`
            });
            return await response.json();
        }

        // Парсинг данных (теперь понимает и лампы)
        function extractRelayData(status) {
            let power = 0, voltage = null, isOn = false, brightness = null;

            // Статус ВКЛ/ВЫКЛ и Яркость
            if (status.lights && status.lights.length > 0) {
                isOn = status.lights[0].ison;
                brightness = status.lights[0].brightness;
            } else if (status.relays && status.relays.length > 0) {
                isOn = status.relays[0].ison;
                if (status.relays[0].brightness !== undefined) brightness = status.relays[0].brightness;
            } else if (status['light:0']) {
                isOn = status['light:0'].output;
                brightness = status['light:0'].brightness;
            } else if (status['switch:0'] && status['switch:0'].output !== undefined) {
                isOn = status['switch:0'].output;
            }
            
            // Мощность и напряжение
            if (status.meters && status.meters.length > 0) {
                power = status.meters[0].power || 0;
                if (status.meters[0].voltage !== undefined) voltage = status.meters[0].voltage;
            } 
            else if (status['switch:0']) {
                power = status['switch:0'].apower || 0;
                if (status['switch:0'].voltage !== undefined) voltage = status['switch:0'].voltage;
            }
            else if (status.emeters && status.emeters.length > 0) {
                power = status.emeters[0].power || 0;
                if (status.emeters[0].voltage !== undefined) voltage = status.emeters[0].voltage;
            }

            return { power, voltage, isOn, brightness };
        }

        function updateClimateUI(res) {
            if (!res.isok) return;
            const status = res.data.device_status;
            if (status.tmp && status.tmp.value !== undefined) document.getElementById('ht-temp').innerText = status.tmp.value.toFixed(1);
            if (status.hum && status.hum.value !== undefined) document.getElementById('ht-humidity').innerText = status.hum.value.toFixed(1);
            document.getElementById('ht-updated').innerText = `Обновлено: ${new Date().toLocaleTimeString()}`;
        }

        function updatePumpUI(res) {
            if (!res.isok) return;
            const { power, voltage, isOn } = extractRelayData(res.data.device_status);
            document.getElementById('ilp-power').innerText = power.toFixed(1);
            if (voltage !== null) {
                document.getElementById('ilp-voltage-row').style.display = 'flex';
                document.getElementById('ilp-voltage').innerText = voltage.toFixed(1);
            }
            document.getElementById('ilp-updated').innerText = `Обновлено: ${new Date().toLocaleTimeString()}`;
            const badge = document.getElementById('ilp-badge');
            if (isOn) {
                badge.className = 'status-badge on'; badge.innerText = 'ВКЛЮЧЕН';
            } else {
                badge.className = 'status-badge off'; badge.innerText = 'ВЫКЛЮЧЕН';
            }
        }

        function updateRelayUI(res, prefix, isLight = false) {
            if (!res.isok) return; 
            const { power, voltage, isOn, brightness } = extractRelayData(res.data.device_status);
            
            // Если это не лампа, обновляем ватты и вольты
            if (!isLight) {
                document.getElementById(`${prefix}-power`).innerText = power.toFixed(1);
                if (voltage !== null) document.getElementById(`${prefix}-voltage`).innerText = voltage.toFixed(1);
            }

            // Управление кнопкой
            const btn = document.getElementById(`btn-${prefix}`);
            const card = document.getElementById(`card-${prefix}`);
            if (isOn) {
                btn.className = 'power-btn on'; card.classList.add('active');
            } else {
                btn.className = 'power-btn off'; card.classList.remove('active');
            }

            // Управление ползунком яркости (если это диммер и юзер его сейчас не дергает)
            if (isLight && brightness !== null) {
                const slider = document.getElementById(`slider-${prefix}`);
                if (slider && !slider.dataset.dragging) {
                    slider.value = brightness;
                    document.getElementById(`br-${prefix}`).innerText = brightness + '%';
                }
            }
        }

        let isUpdating = false;

        async function syncAllDevices() {
            if (isUpdating) return;
            isUpdating = true;

            const devices = [
                { id: PUMP_DEVICE_ID, ui: updatePumpUI, type: 'pump' },
                { id: '08b61f69c128', ui: (res) => updateRelayUI(res, 'ev1', false), type: 'ev1' },
                { id: 'b0b21c0f6728', ui: (res) => updateRelayUI(res, 'ev2', false), type: 'ev2' },
                { id: HT_DEVICE_ID, ui: updateClimateUI, type: 'climate' },
                // Освещение
                { id: '98cdac2d2465', ui: (res) => updateRelayUI(res, 'light1', true), type: 'light1' },
                { id: '349454777f7a', ui: (res) => updateRelayUI(res, 'light2', true), type: 'light2' },
                { id: '98cdac2c88f4', ui: (res) => updateRelayUI(res, 'light3', true), type: 'light3' },
                { id: '441793a671e8', ui: (res) => updateRelayUI(res, 'light4', false), type: 'light4' }
            ];

            for (const dev of devices) {
                try {
                    const res = await fetchShellyStatus(dev.id);
                    dev.ui(res);
                } catch (e) {
                    console.error(`Ошибка при опросе ${dev.id}:`, e);
                }
                await new Promise(r => setTimeout(r, 400));
            }
            isUpdating = false;
        }

        // Универсальная кнопка Вкл/Выкл (понимает relay и light)
        async function toggleDevice(deviceId, prefix, endpointType) {
            const btn = document.getElementById(`btn-${prefix}`);
            const isCurrentlyOn = btn.classList.contains('on');
            const command = isCurrentlyOn ? 'off' : 'on';
            
            const card = document.getElementById(`card-${prefix}`);
            if (command === 'on') {
                btn.className = 'power-btn on'; card.classList.add('active');
            } else {
                btn.className = 'power-btn off'; card.classList.remove('active');
            }

            try {
                // Если это свет, шлем на light/control, если реле - на relay/control
                const targetUrl = `https://shelly-70-eu.shelly.cloud/device/${endpointType}/control`;
                const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(targetUrl);
                await fetch(proxyUrl, {
                    method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `id=${deviceId}&auth_key=${AUTH_KEY}&channel=0&turn=${command}`
                });
            } catch (error) {
                console.error("Ошибка при нажатии:", error);
            }
        }

        // Функция изменения яркости (только для ламп)
        async function setBrightness(deviceId, prefix, value) {
            try {
                const targetUrl = 'https://shelly-70-eu.shelly.cloud/device/light/control';
                const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(targetUrl);
                // При изменении яркости заодно отправляем команду turn=on, чтобы лампа включилась
                await fetch(proxyUrl, {
                    method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `id=${deviceId}&auth_key=${AUTH_KEY}&channel=0&turn=on&brightness=${value}`
                });
                
                // Включаем интерфейс (кнопку и рамку), если лампа была выключена
                document.getElementById(`btn-${prefix}`).className = 'power-btn on';
                document.getElementById(`card-${prefix}`).classList.add('active');
            } catch (error) {
                console.error("Ошибка яркости:", error);
            }
        }

        syncAllDevices();
        setInterval(syncAllDevices, 15000); 
    </script>
</body>
