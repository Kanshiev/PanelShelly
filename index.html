<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Shelly - Дом</title>
    <style>
        /* Темная тема Shelly Cloud */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #16181c;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #ffffff;
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-align: left;
            width: 100%;
            max-width: 600px;
            border-bottom: 1px solid #2c3036;
            padding-bottom: 15px;
        }

        .dashboard-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            width: 100%;
            max-width: 600px;
            justify-content: center;
        }

        /* --- Квадратные карточки --- */
        .device-card {
            background-color: #272a31;
            border-radius: 12px;
            padding: 20px;
            width: 220px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .device-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 5px;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .device-subtitle {
            font-size: 0.75rem;
            color: #8b929c;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .sensor-data {
            display: flex; align-items: center; justify-content: center;
            width: 100%; margin-bottom: 10px; padding: 10px;
            background-color: #1e2025; border-radius: 10px; box-sizing: border-box;
        }

        .sensor-item {
            display: flex; align-items: center; gap: 8px;
            font-size: 1.1rem; font-weight: 600; color: #e0e6ed;
        }

        .sensor-icon { display: flex; align-items: center; color: #6db1ff; }

        .temp-badge {
            background-color: #31363f; padding: 10px 20px; border-radius: 20px;
            font-size: 1.4rem; font-weight: bold; display: flex; align-items: center;
            gap: 10px; margin-top: 5px;
        }

        .temp-badge .sensor-icon { color: #ff6b8b; }

        .status-badge {
            font-size: 0.85rem; padding: 6px 16px; border-radius: 12px;
            font-weight: 600; margin-top: 10px; transition: all 0.3s ease;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .status-badge.on { background-color: rgba(0, 123, 255, 0.2); color: #6db1ff; border: 1px solid #007bff; }
        .status-badge.off { background-color: #1e2025; color: #8b929c; border: 1px solid transparent; }

        .update-time { font-size: 0.7rem; color: #5a6069; margin-top: 15px; text-align: center;}
        .error-text { color: #ff6b8b; font-weight: bold; }
        .unit { font-size: 0.85rem; color: #8b929c; margin-left: 2px; }

        /* --- Горизонтальные карточки (Реле) --- */
        .relays-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 15px;
        }

        .relay-card {
            background-color: #272a31;
            border-radius: 12px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .relay-card.active { border: 2px solid #007bff; background-color: #212833; }
        
        .relay-left { display: flex; align-items: center; gap: 15px; flex-grow: 1; }
        
        .relay-device-icon {
            background-color: #92313b;
            width: 44px; height: 44px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid #1a1c21;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
            color: #ffffff;
        }

        .relay-info { display: flex; flex-direction: column; gap: 4px; }
        .relay-name { font-size: 1rem; font-weight: 700; color: #ffffff; }
        
        .relay-stats { display: flex; gap: 15px; font-size: 0.85rem; color: #e0e6ed; font-weight: 600; }
        .relay-stats span { display: flex; align-items: center; gap: 4px; }
        .relay-stats .sensor-icon { width: 12px; height: 12px; color: #8b929c; }

        .power-btn {
            width: 46px; height: 46px; border-radius: 50%; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s ease; outline: none; box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .power-btn svg { width: 20px; height: 20px; fill: currentColor; }
        .power-btn.off { background-color: #e0e6ed; color: #007bff; }
        .power-btn.on { background-color: #007bff; color: #ffffff; box-shadow: 0 0 15px rgba(0, 123, 255, 0.4); }

    </style>
</head>
<body>

    <svg style="display: none;">
        <symbol id="icon-drop" viewBox="0 0 24 24"><path d="M12 20A6 6 0 0 1 6 14C6 10 12 3.25 12 3.25S18 10 18 14A6 6 0 0 1 12 20Z" fill="currentColor"/></symbol>
        <symbol id="icon-temp" viewBox="0 0 24 24"><path d="M15 13V5A3 3 0 0 0 9 5V13A5 5 0 1 0 15 13M12 4A1 1 0 0 1 13 5V8H11V5A1 1 0 0 1 12 4Z" fill="currentColor"/></symbol>
        <symbol id="icon-power" viewBox="0 0 24 24"><path d="M12 21c-4.97 0-9-4.03-9-9 0-3.32 1.8-6.22 4.47-7.79l1.01 1.74A7.001 7.001 0 0 0 5 12c0 3.86 3.14 7 7 7s7-3.14 7-7c0-2.58-1.4-4.93-3.64-6.19l1.01-1.74C19.16 5.67 21 8.65 21 12c0 4.97-4.03 9-9 9zm-1-18h2v9h-2V3z" fill="currentColor"/></symbol>
        <symbol id="icon-lightning" viewBox="0 0 24 24"><path d="M7 14L11 14L11 22L17 10L13 10L13 2Z" fill="currentColor"/></symbol>
    </svg>

    <h1>Мой дом</h1>

    <div class="dashboard-container">
        
        <div class="device-card">
            <div class="device-title">КЛИМАТ ДОМА</div>
            <div class="device-subtitle">Гостиная</div>
            <div class="sensor-data">
                <div class="sensor-item">
                    <span class="sensor-icon"><svg width="20" height="20"><use href="#icon-drop"></use></svg></span>
                    <span id="ht-humidity">--.-</span><span class="unit">%</span>
                </div>
            </div>
            <div class="temp-badge">
                <span class="sensor-icon"><svg width="24" height="24"><use href="#icon-temp"></use></svg></span>
                <span id="ht-temp">--.-</span><span class="unit" style="color: #fff;">°C</span>
            </div>
            <div class="update-time" id="ht-updated">Синхронизация...</div>
        </div>

        <div class="device-card">
            <div class="device-title">ILP koti</div>
            <div class="device-subtitle">Большая комната</div>
            
            <div class="sensor-data">
                <div class="sensor-item">
                    <span class="sensor-icon"><svg width="18" height="18"><use href="#icon-lightning"></use></svg></span>
                    <span id="ilp-power">0.0</span> <span class="unit">W</span>
                </div>
            </div>
            <div class="sensor-data" id="ilp-voltage-row" style="display: none;">
                <div class="sensor-item">
                    <span class="sensor-icon"><svg width="18" height="18"><use href="#icon-lightning"></use></svg></span>
                    <span id="ilp-voltage">0.0</span> <span class="unit">V</span>
                </div>
            </div>

            <div id="ilp-badge" class="status-badge off">ОЖИДАНИЕ</div>
            <div class="update-time" id="ilp-updated">Синхронизация...</div>
        </div>

    </div>

    <div class="relays-container">
        
        <div class="relay-card" id="card-ev1">
            <div class="relay-left">
                <div class="relay-device-icon"><svg width="24" height="24"><use href="#icon-lightning"></use></svg></div>
                <div class="relay-info">
                    <div class="relay-name">EV lataus (Outlander)</div>
                    <div class="relay-stats">
                        <span><span class="sensor-icon"><svg><use href="#icon-lightning"></use></svg></span> <span id="ev1-power">0.0</span> W</span>
                        <span id="ev1-voltage-row"><span class="sensor-icon"><svg><use href="#icon-lightning"></use></svg></span> <span id="ev1-voltage">0.0</span> V</span>
                    </div>
                </div>
            </div>
            <button class="power-btn off" id="btn-ev1" onclick="toggleRelay('08b61f69c128', 'ev1')">
                <svg><use href="#icon-power"></use></svg>
            </button>
        </div>

        <div class="relay-card" id="card-ev2">
            <div class="relay-left">
                <div class="relay-device-icon"><svg width="24" height="24"><use href="#icon-lightning"></use></svg></div>
                <div class="relay-info">
                    <div class="relay-name">EV lataus (e-Up)</div>
                    <div class="relay-stats">
                        <span><span class="sensor-icon"><svg><use href="#icon-lightning"></use></svg></span> <span id="ev2-power">0.0</span> W</span>
                        <span id="ev2-voltage-row"><span class="sensor-icon"><svg><use href="#icon-lightning"></use></svg></span> <span id="ev2-voltage">0.0</span> V</span>
                    </div>
                </div>
            </div>
            <button class="power-btn off" id="btn-ev2" onclick="toggleRelay('b0b21c0f6728', 'ev2')">
                <svg><use href="#icon-power"></use></svg>
            </button>
        </div>

    </div>

    <script>
        const AUTH_KEY = "MWEzMWI0dWlk07E8AECF7EC066046A87D6410853E336FBB1D6F260B8376F3C047EE699E8019EA03F97657F6EF690";
        const HT_DEVICE_ID = "c9f4e3"; 
        const PUMP_DEVICE_ID = "7c87ceb51d71"; 

        async function fetchShellyStatus(deviceId) {
            const targetUrl = 'https://shelly-70-eu.shelly.cloud/device/status';
            const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(targetUrl);
            const response = await fetch(proxyUrl, {
                method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `id=${deviceId}&auth_key=${AUTH_KEY}`
            });
            return await response.json();
        }

        // Парсинг 
        function extractRelayData(status) {
            let power = 0, voltage = null, isOn = false;

            if (status.relays && status.relays.length > 0) isOn = status.relays[0].ison;
            else if (status['switch:0'] && status['switch:0'].output !== undefined) isOn = status['switch:0'].output;
            
            if (status.meters && status.meters.length > 0) {
                power = status.meters[0].power || 0;
                if (status.meters[0].voltage !== undefined) voltage = status.meters[0].voltage;
            } 
            else if (status['switch:0']) {
                power = status['switch:0'].apower || 0;
                if (status['switch:0'].voltage !== undefined) voltage = status['switch:0'].voltage;
            }
            else if (status.emeters && status.emeters.length > 0) {
                power = status.emeters[0].power || 0;
                if (status.emeters[0].voltage !== undefined) voltage = status.emeters[0].voltage;
            }

            return { power, voltage, isOn };
        }

        // UI функции (теперь они не ломают друг друга)
        function updateClimateUI(res) {
            if (!res.isok) {
                document.getElementById('ht-updated').innerHTML = `<span class="error-text">Ожидание сети...</span>`;
                return;
            }
            const status = res.data.device_status;
            if (status.tmp && status.tmp.value !== undefined) document.getElementById('ht-temp').innerText = status.tmp.value.toFixed(1);
            if (status.hum && status.hum.value !== undefined) document.getElementById('ht-humidity').innerText = status.hum.value.toFixed(1);
            document.getElementById('ht-updated').innerText = `Обновлено: ${new Date().toLocaleTimeString()}`;
        }

        function updatePumpUI(res) {
            if (!res.isok) return;
            const { power, voltage, isOn } = extractRelayData(res.data.device_status);
            
            document.getElementById('ilp-power').innerText = power.toFixed(1);
            
            if (voltage !== null) {
                document.getElementById('ilp-voltage-row').style.display = 'flex';
                document.getElementById('ilp-voltage').innerText = voltage.toFixed(1);
            }

            document.getElementById('ilp-updated').innerText = `Обновлено: ${new Date().toLocaleTimeString()}`;

            const badge = document.getElementById('ilp-badge');
            if (isOn) {
                badge.className = 'status-badge on'; badge.innerText = 'ВКЛЮЧЕН';
            } else {
                badge.className = 'status-badge off'; badge.innerText = 'ВЫКЛЮЧЕН';
            }
        }

        function updateRelayUI(res, prefix) {
            if (!res.isok) return; // Если ошибка - просто не трогаем интерфейс, оставляем старые значения
            const { power, voltage, isOn } = extractRelayData(res.data.device_status);
            
            document.getElementById(`${prefix}-power`).innerText = power.toFixed(1);
            
            // Если напряжение пришло - обновляем. Если нет - просто не трогаем.
            if (voltage !== null) {
                document.getElementById(`${prefix}-voltage`).innerText = voltage.toFixed(1);
            }

            const btn = document.getElementById(`btn-${prefix}`);
            const card = document.getElementById(`card-${prefix}`);
            if (isOn) {
                btn.className = 'power-btn on'; card.classList.add('active');
            } else {
                btn.className = 'power-btn off'; card.classList.remove('active');
            }
        }

        // НОВЫЙ ДВИЖОК ОПРОСА (Независимый)
        let isUpdating = false;

        async function syncAllDevices() {
            if (isUpdating) return;
            isUpdating = true;

            // Массив наших устройств для опроса
            const devices = [
                { id: PUMP_DEVICE_ID, ui: updatePumpUI, type: 'pump' },
                { id: '08b61f69c128', ui: updateRelayUI, type: 'ev1' },
                { id: 'b0b21c0f6728', ui: updateRelayUI, type: 'ev2' },
                { id: HT_DEVICE_ID, ui: updateClimateUI, type: 'climate' }
            ];

            // Опрашиваем по очереди с паузой, чтобы прокси не блокировал
            for (const dev of devices) {
                try {
                    const res = await fetchShellyStatus(dev.id);
                    if (dev.type.startsWith('ev')) dev.ui(res, dev.type);
                    else dev.ui(res);
                } catch (e) {
                    console.error(`Ошибка при опросе ${dev.id}:`, e);
                    if (dev.type === 'climate') {
                        document.getElementById('ht-updated').innerHTML = `<span class="error-text">Ожидание прокси...</span>`;
                    }
                }
                // Микро-пауза перед следующим запросом
                await new Promise(r => setTimeout(r, 400));
            }

            isUpdating = false;
        }

        // Кнопки Вкл/Выкл
        async function toggleRelay(deviceId, prefix) {
            const btn = document.getElementById(`btn-${prefix}`);
            const isCurrentlyOn = btn.classList.contains('on');
            const command = isCurrentlyOn ? 'off' : 'on';
            
            const card = document.getElementById(`card-${prefix}`);
            if (command === 'on') {
                btn.className = 'power-btn on'; card.classList.add('active');
            } else {
                btn.className = 'power-btn off'; card.classList.remove('active');
            }

            try {
                const targetUrl = 'https://shelly-70-eu.shelly.cloud/device/relay/control';
                const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(targetUrl);
                await fetch(proxyUrl, {
                    method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `id=${deviceId}&auth_key=${AUTH_KEY}&channel=0&turn=${command}`
                });
                
                setTimeout(() => {
                    fetchShellyStatus(deviceId).then(res => updateRelayUI(res, prefix));
                }, 1500);
            } catch (error) {
                console.error("Ошибка при нажатии:", error);
            }
        }

        // Увеличили интервал до 15 секунд для стабильности
        syncAllDevices();
        setInterval(syncAllDevices, 15000); 
    </script>
</body>
</html>
